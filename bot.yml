name: Run Bot

on:
  schedule:
    # كل 6 ساعات تقريبًا - عدّل الرقم لو حابب
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # يسمحلك تشغّله يدوي من تبويب Actions

concurrency:
  group: bot-runner
  cancel-in-progress: true   # يمنع تشغيل نسختين مع بعض لو حصل تداخل

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # يقفل الجوب قبل ما يوصل حد الـ 6 ساعات (يفضي فرصة للـ cron التاني يشغّله)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # لو عندك ملف بيانات (SQLite / storage.js) وعاوز يفضل محفوظ بين كل تشغيلة
      - name: Restore persisted data
        uses: actions/cache@v4
        with:
          path: |
            *.db
            *.sqlite
            data/
          key: bot-storage-${{ github.run_id }}
          restore-keys: |
            bot-storage-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run bot
        env:
          # عدّل أسماء الـ secrets دي بالظبط زي أسامي الـ env vars في config.js / gemini.js
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js
